name: Docker Image CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ALIYUN_USERNAME  # 指定使用 Environment 配置
    steps:
    - uses: actions/checkout@v3

    - name: Login to Alibaba Cloud Registry
      run: echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login -u ${{ secrets.ALIYUN_USERNAME }} --password-stdin registry.cn-hangzhou.aliyuncs.com

    - name: Pull and Push Images
      run: |
        # 读取 images.txt 中的镜像列表，格式: 源镜像名=目标镜像名(可选)
        # 示例:
        # labring/kubernetes-docker:v1.29.5-arm64
        # nginx:latest=my-nginx:latest
        while IFS= read -r line || [[ -n "$line" ]]; do
          # 跳过空行和注释行
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          
          # 解析源镜像和目标镜像
          if [[ "$line" == *"="* ]]; then
            source_image="${line%%=*}"
            target_image="${line#*=}"
          else
            source_image="$line"
            target_image="$line"
          fi
          
          # 去除前后空格
          source_image=$(echo "$source_image" | xargs)
          target_image=$(echo "$target_image" | xargs)
          
          # 提取镜像名（去掉命名空间前缀）
          # 例如: labring/kubernetes-docker:v1.29.5-arm64 → kubernetes-docker:v1.29.5-arm64
          if [[ "$target_image" == *"/"* ]]; then
            target_image="${target_image##*/}"
          fi
          
          echo "========================================"
          echo "正在处理镜像: $source_image"
          echo "目标镜像: registry.cn-hangzhou.aliyuncs.com/zhangjinhui/$target_image"
          echo "========================================"
          
          # 拉取源镜像
          docker pull "$source_image"
          
          # 重新标记镜像
          docker tag "$source_image" "registry.cn-hangzhou.aliyuncs.com/zhangjinhui/$target_image"
          
          # 推送到阿里云
          docker push "registry.cn-hangzhou.aliyuncs.com/zhangjinhui/$target_image"
          
          echo "镜像 $source_image 处理完成"
          echo ""
        done < images.txt
